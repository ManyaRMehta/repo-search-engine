name: CI

on:
  push: {}
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Run unit tests
        run: >
          pytest -q
          -m "not postgres_integration and not redis_integration"

  postgres-integration-tests:
    name: PostgreSQL integration tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: repo_search
          POSTGRES_PASSWORD: repo_search
          POSTGRES_DB: repo_search_engine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U repo_search -d repo_search_engine_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://repo_search:repo_search@localhost:5432/repo_search_engine_test
      TEST_DATABASE_URL: postgresql+psycopg://repo_search:repo_search@localhost:5432/repo_search_engine_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Apply database migrations
        run: python -m alembic upgrade head

      - name: Run PostgreSQL integration tests
        run: pytest -q -m postgres_integration

  redis-integration-tests:
    name: Redis integration tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_REDIS_URL: redis://localhost:6379/1

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Run Redis integration tests
        run: pytest -q -m redis_integration

  docker-validation:
    name: Docker validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate Docker Compose configuration
        run: docker compose config --quiet

      - name: Build API Docker image
        run: >
          docker build
          --file backend/Dockerfile
          --tag repo-search-api:ci
          backend